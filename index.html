<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=http://localhost:3000/en" />
    <title>RaceTrack Competition</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070908;
        --fg: #f4f5f1;
        --muted: #a6aca7;
        --brand: #36c84b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 620px);
        border: 1px solid rgb(255 255 255 / 0.12);
        border-radius: 8px;
        padding: 32px;
        background: #101311;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: var(--brand);
        font-weight: 700;
      }

      code {
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RaceTrack Competition</h1>
      <p>
        Opening the local website. If nothing happens, start the project first:
      </p>
      <p><code>pnpm start</code></p>
      <p>
        Then open
        <a href="http://localhost:3000/en">http://localhost:3000/en</a>.
      </p>
    </main>
  </body>
</html>
